[font]
size = 12.0

[font.normal]
family = "Agave Nerd Font Mono"
style = "Regular"

[font.bold]
family = "Agave Nerd Font Mono"
style = "Bold"

[font.italic]
family = "Agave Nerd Font Mono"
style = "Regular"

[font.bold_italic]
family = "Agave Nerd Font Mono"
style = "Bold"

[colors.primary]
background = "#1a1b26"
foreground = "#a9b1d6"

[colors.normal]
black   = "#414868"
red     = "#f7768e"
green   = "#9ece6a"
yellow  = "#e0af68"
blue    = "#7aa2f7"
magenta = "#bb9af7"
cyan    = "#7dcfff"
white   = "#a9b1d6"

[colors.bright]
black   = "#414868"
red     = "#f7768e"
green   = "#9ece6a"
yellow  = "#e0af68"
blue    = "#7aa2f7"
magenta = "#bb9af7"
cyan    = "#7dcfff"
white   = "#c0caf5"

[colors.cursor]
text   = "#1a1b26"
cursor = "#c0caf5"

[colors.selection]
text       = "CellForeground"
background = "#33467c"

[window]
opacity = 0.9



